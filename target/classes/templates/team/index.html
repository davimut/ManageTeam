<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Pixeltek - Cyber-Log</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome per le icone -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --cyber-fuxia: #e01b84; /* Colore estratto dal logo */
            --cyber-fuxia-glow: rgba(224, 27, 132, 0.6);
            --cyber-dark: #0a0b10;
            --cyber-light: #f0f0f0;
            --cyber-gray: #1a1c24;
        }

        body {
            background-color: var(--cyber-light) !important;
            color: var(--cyber-light) !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Navbar stilizzata */
        .navbar-cyber {
            background-color: rgb(0, 0, 0) !important;
            border-bottom: 2px solid var(--cyber-fuxia);
            box-shadow: 0 0 15px var(--cyber-fuxia-glow);
        }

        .navbar-brand-img {
            height: 40px; /* Altezza regolabile per il logo fuxia.png */
            width: auto;
        }

        /* Testi principali */
        h1.cyber-h1 {
            color: var(--cyber-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--cyber-fuxia-glow);
        }

        .text-cyber-muted {
            color: #888;
        }

        /* Card Membri stile Cyber */
        .member-card {
            background-color: var(--cyber-gray) !important;
            border: 1px solid var(--cyber-fuxia) !important;
            border-radius: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 5px rgba(224, 27, 132, 0.2);
          
           
        }

        .member-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 0 25px var(--cyber-fuxia-glow) !important;
            border-color: var(--cyber-light) !important;
        }

        .card-title-cyber {
            color: var(--cyber-fuxia);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-text-cyber {
            color: #bbb;
        }

        /* Gestione Immagini */
        .member-img-container {
            border-bottom: 2px solid var(--cyber-fuxia);
        }

        .avatar-placeholder-cyber {
            width: 100%;
            height: 200px;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cyber-fuxia);
            text-shadow: 0 0 10px var(--cyber-fuxia-glow);
        }

        .member-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        /* Pulsanti Cyber */
        .btn-cyber-primary {
            background-color: transparent;
            border: 2px solid var(--cyber-fuxia);
            color: var(--cyber-fuxia);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 0;
            transition: all 0.3s;
        }

        .btn-cyber-primary:hover {
            background-color: var(--cyber-fuxia);
            color: #000;
            box-shadow: 0 0 15px var(--cyber-fuxia-glow);
        }

        .btn-cyber-outline {
            background-color: transparent;
            border: 1px solid var(--cyber-light);
            color: var(--cyber-light);
            border-radius: 0;
        }

        .btn-cyber-outline:hover {
            background-color: var(--cyber-light);
            color: #000;
        }

        .btn-cyber-warning {
            color: #ffc107;
            border-color: #ffc107;
            border-radius: 0;
        }
        .btn-cyber-warning:hover {
            background-color: #ffc107;
            color: #000;
        }

        .btn-cyber-danger {
            color: #dc3545;
            border-color: #dc3545;
            border-radius: 0;
        }
        .btn-cyber-danger:hover {
            background-color: #dc3545;
            color: #000;
        }

        /* Alert stilizzati */
        .alert-cyber-success {
            background-color: #002b00;
            border: 1px solid #00ff00;
            color: #00ff00;
            border-radius: 0;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.4);
        }

        .alert-cyber-danger {
            background-color: #2b0000;
            border: 1px solid #ff0000;
            color: #ff0000;
            border-radius: 0;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
        }

        hr.cyber-hr {
            border-top: 1px solid var(--cyber-fuxia);
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <!-- Navbar con logo fuxia.png -->
    <nav class="navbar navbar-dark navbar-cyber mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/team">
                <img th:src="@{/images/fuxia.png}" alt="Team Pixeltek Logo" class="navbar-brand-img me-2">
                <!-- Se il logo contiene già il testo, puoi rimuovere lo span sotto -->
                <!-- <span class="fw-bold text-cyber-fuxia">Team Pixeltek</span> -->
            </a>
        </div>
    </nav>

    <div class="container">
        
        <!-- Intestazione e Bottone di Creazione -->
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
            <div>
                <h1 class="fw-bold cyber-h1 m-0">Team <span style="color: var(--cyber-fuxia)">Pixeltek</span></h1>
                <p class="text-cyber-muted  cyber-h2 m-0">Interfaccia di Gestione Membri // Pixeltek.</p>
            </div>
            <a th:href="@{/team/crea}" class="btn btn-cyber-primary px-4 py-2 shadow-sm">
                <i class="fa-solid fa-user-plus me-2"></i>Inizializza Profilo
            </a>
        </div>

        <!-- Alert Stilizzati -->
        <div th:if="${successMessage}" class="alert alert-cyber-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <div th:if="${errorMessage}" class="alert alert-cyber-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="fa-solid fa-circle-exclamation me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Stato Lista Vuota Cyber -->
        <div th:if="${#lists.isEmpty(membri)}" class="text-center py-5 bg-black border border-secondary rounded shadow-sm">
            <i class="fa-solid fa-users-slash fa-3x text-cyber-muted mb-3"></i>
            <h3 class="text-cyber-muted">Nessun dato registrato nel modulo team</h3>
            <p class="text-cyber-muted">Usa il comando 'Inizializza Profilo' per iniziare.</p>
        </div>

        <!-- Griglia dei Membri (Stile Cyber) -->
        <div th:if="${not #lists.isEmpty(membri)}" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mb-5">
            
            <div class="col" th:each="membro : ${membri}">
                <div class="card h-70 border-0 shadow-sm member-card">
                    
                    <!-- Immagine di Profilo con Bordo Fuxia -->
                    <div class="position-relative member-img-container">
                        <img th:if="${membro.fotoUrl != null && !membro.fotoUrl.isEmpty()}" 
                             th:src="${membro.fotoUrl}" 
                             class="card-img-top member-img" 
                             th:alt="${membro.nome + ' ' + membro.cognome}">
                        
                        <div th:unless="${membro.fotoUrl != null && !membro.fotoUrl.isEmpty()}" class="avatar-placeholder-cyber">
                            <i class="fa-solid fa-user fa-4x"></i>
                        </div>
                    </div>

                    <!-- Corpo della Card Cyber -->
                    <div class="card-body d-flex flex-column bg-black">
                        <h4 class="card-title card-title-cyber mb-1" th:text="${membro.nome + ' ' + membro.cognome}">Nome Cognome</h4>
                        <p class="card-text card-text-cyber flex-grow-1 text-truncate-3" th:text="${membro.descrizione}">
                            Descrizione unità...
                        </p>
                        
                        <hr class="cyber-hr my-3">

                        <!-- Pulsanti d'Azione Cyber -->
                        <div class="d-flex justify-content-between align-items-center">
                            <a th:href="@{/team/dettaglio/{id}(id=${membro.id})}" class="btn btn-cyber-outline btn-sm px-3">
                                <i class="fa-solid fa-eye me-1"></i>info membro
                            </a>
                            
                            <div class="btn-group">
                                <a th:href="@{/team/modifica/{id}(id=${membro.id})}" class="btn btn-outline-warning btn-cyber-warning btn-sm">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </a>
                                <form th:action="@{/team/elimina/{id}(id=${membro.id})}" method="POST" 
                                      onsubmit="return confirm('Confermare la rimozione definitiva dell\'unità dal database?');" class="d-inline">
                                    <button type="submit" class="btn btn-outline-danger btn-cyber-danger btn-sm rounded-end">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- Bootstrap 5 Bundle con Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
